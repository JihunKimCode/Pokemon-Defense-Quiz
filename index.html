<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pokemon Defense Quiz</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">

  <h1 class="title">Pokémon Defense Quiz</h1>
  <div id="streak" class="streak">Streak: 0</div>
  <div id="question" class="card"></div>
  <div id="types" class="types"></div>
  <div id="feedback"></div>

  <button id="submitBtn" onclick="submitAnswer()" class="btn">
    Submit
  </button>

</div>

<!-- Popup -->
<div id="popup">
  <div id="popup-content">
    <div id="resultText"></div>
    <button onclick="restartGame()" class="btn">Restart</button>
  </div>
</div>

<!-- Footer -->
<footer class="footer">
    <p>
    Images are sourced from
    <a href="https://github.com/CajunAvenger/cajunavenger.github.io" target="_blank" rel="noopener noreferrer">CajunAvenger</a>.
    <br>© <span id="year"></span> Pokémon. © 1995-<span id="year2"></span> Nintendo/Creatures Inc./GAME FREAK inc.
    </p>
</footer>

<script src="script.js"></script>
</body>
</html>
